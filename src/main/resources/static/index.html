<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>匯率查詢系統</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="mb-4"><strong>單幣別匯率歷史查詢</strong></h2>

    <div class="mb-3">

        <label>選擇幣別</label>

        <select id="currency" class="form-select" onchange="loadChart()">

        </select>

    </div>

    <div class="mb-3">

        <label>資料範圍</label>

        <select id="days" class="form-select" onchange="loadChart()">

            <option value="2">最近2天</option>
            <option value="3">最近3天</option>
            <option value="7" selected>最近7天</option>
            <option value="30">最近30天</option>
            <option value="90">最近90天</option>

        </select>

    </div>

    <canvas id="rateChart"></canvas>

    <hr class="mt-5">

    <h2><strong>多幣別匯率歷史查詢</strong></h2>

    <div class="row mb-3">

        <div class="col-md-3">

            <label>匯率類型</label>

            <select id="rateType" class="form-select" onchange="loadCompareChart()">

                <option value="cashBuy">現金買入</option>
                <option value="cashSell">現金賣出</option>
                <option value="spotBuy">即期買入</option>
                <option value="spotSell" selected>即期賣出</option>

            </select>

        </div>

        <div class="col-md-3">

            <label>N 天範圍</label>

            <select id="compareDays" class="form-select" onchange="loadCompareChart()">

                <option value="2">最近2天</option>
                <option value="3">最近3天</option>
                <option value="7" selected>最近7天</option>
                <option value="30">最近30天</option>
                <option value="90">最近90天</option>

            </select>

        </div>

        <div class="col-md-6">

            <label>選擇幣別 (最多5)</label>

            <div id="currencyCheckboxContainer" class="d-flex flex-wrap gap-2"></div>

        </div>

    </div>

    <canvas id="compareChart"></canvas>

</div>

<script>

    let chart;

    const currencyName = {

        USD: "美金",
        JPY: "日圓",
        EUR: "歐元",
        HKD: "港幣",
        GBP: "英鎊",
        AUD: "澳幣",
        CAD: "加幣",
        SGD: "新加坡幣",
        CNY: "人民幣",
        CHF: "瑞士法郎",
        SEK: "瑞典幣",
        NZD: "紐幣",
        THB: "泰銖",
        VND: "越南盾",
        IDR: "印尼幣",
        KRW: "韓元",
        MYR: "馬來幣",
        PHP: "菲國比索",
        ZAR: "南非幣"

    };

    let compareChart;

    async function loadCurrencies() {

        const response = await fetch("/api/currencies");

        const data = await response.json();

        const select = document.getElementById("currency");

        select.innerHTML = "";

        data.forEach(code => {

            const option = document.createElement("option");

            const name = currencyName[code] || code;

            option.value = code;

            option.text = name + " (" + code + ")";

            select.appendChild(option);

        });

        loadChart();

    }

    async function loadChart() {

        const currency = document.getElementById("currency").value;

        const days = document.getElementById("days").value;

        const response = await fetch("/api/rates/history/" + currency + "?days=" + days);

        const data = await response.json();

        const labels = data.map(r => r.rateDate);

        const cashBuy = data.map(r => r.cashBuy);
        const cashSell = data.map(r => r.cashSell);
        const spotBuy = data.map(r => r.spotBuy);
        const spotSell = data.map(r => r.spotSell);

        if (chart) {
            chart.destroy();
        }

        const ctx = document.getElementById("rateChart");

        chart = new Chart(ctx, {

            type: 'line',

            data: {

                labels: labels,

                datasets: [

                    {
                        label: "現金買入",
                        data: cashBuy,
                        borderColor: "green",
                        fill: false
                    },

                    {
                        label: "現金賣出",
                        data: cashSell,
                        borderColor: "red",
                        fill: false
                    },

                    {
                        label: "即期買入",
                        data: spotBuy,
                        borderColor: "blue",
                        fill: false
                    },

                    {
                        label: "即期賣出",
                        data: spotSell,
                        borderColor: "orange",
                        fill: false
                    }

                ]

            },

            options: {

                responsive: true,

                interaction: {
                    mode: 'index',
                    intersect: false
                },

                plugins: {
                    legend: {
                        position: 'top'
                    }
                },

                scales: {

                    x: {
                        title: {
                            display: true,
                            text: "日期"
                        }
                    },

                    y: {
                        title: {
                            display: true,
                            text: "匯率"
                        }
                    }

                }

            }

        });

    }

    async function loadCompareCurrencyOptions(){

        const response = await fetch("/api/currencies");
        const currencies = await response.json();

        const container = document.getElementById("currencyCheckboxContainer");

        container.innerHTML = "";

        currencies.forEach(code => {

            const name = currencyName[code] || code;

            const div = document.createElement("div");

            div.className = "form-check";

            div.innerHTML = `
            <input class="form-check-input currency-check"
                   type="checkbox"
                   value="${code}"
                   id="chk_${code}"
                   onchange="loadCompareChart()">

            <label class="form-check-label" for="chk_${code}">
                ${name} (${code})
            </label>
            `;

            container.appendChild(div);

        });

    }

    async function loadCompareChart(){

        const rateType = document.getElementById("rateType").value;

        const days = document.getElementById("compareDays").value;

        const selected = Array.from(
            document.querySelectorAll(".currency-check:checked")
        ).map(cb => cb.value);

        if(selected.length === 0){

            if(compareChart){
                compareChart.destroy();
            }

            return;
        }

        if(selected.length > 5){

            alert("最多只能選5種幣別");

            return;
        }

        const datasets = [];

        let labels = [];

        const colors = ["red","blue","green","orange","purple"];

        for(let i=0;i<selected.length;i++){

            const currency = selected[i];

            const response = await fetch("/api/rates/history/" + currency + "?days=" + days);

            const data = await response.json();

            if(labels.length === 0){

                labels = data.map(r => r.rateDate);

            }

            const values = data.map(r => r[rateType]);

            const name = currencyName[currency] || currency;

            datasets.push({

                label: name + " (" + currency + ")",

                data: values,

                borderColor: colors[i],

                fill:false

            });

        }

        if(compareChart){

            compareChart.destroy();

        }

        const ctx = document.getElementById("compareChart");

        compareChart = new Chart(ctx,{

            type:'line',

            data:{
                labels:labels,
                datasets:datasets
            },

            options:{
                responsive:true,

                interaction:{
                    mode:'index',
                    intersect:false
                },

                plugins: {

                    tooltip: {

                        callbacks: {

                            label: function(context){

                                return context.dataset.label + ": " + context.formattedValue;

                            }

                        }

                    }

                },

                scales: {

                    x: {
                        title: {
                            display: true,
                            text: "日期"
                        }
                    },

                    y: {
                        title: {
                            display: true,
                            text: "匯率"
                        }
                    }

                }
            }

        });

    }

    loadCurrencies();
    loadCompareCurrencyOptions();
    setInterval(loadChart, 60000); // 每 60 秒刷新一次 ( 執行 loadChart() )

</script>

</body>
</html>
